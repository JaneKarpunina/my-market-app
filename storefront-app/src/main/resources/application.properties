spring.application.name=my-market-app

spring.r2dbc.url=r2dbc:h2:mem:///maindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.r2dbc.username=sa
spring.r2dbc.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.org.springframework.r2dbc=DEBUG
logging.level.org.springframework.web=DEBUG

spring.codec.max-in-memory-size=10MB

spring.webflux.multipart.max-file-size=5MB
spring.webflux.multipart.max-request-size=10MB

server.port=8080

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

app.payment-service.url=${PAYMENT_SERVICE_URL:http://localhost:8081}

spring.sql.init.mode=always

spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

